<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="A lightweight Path of Exile 2 campaign reward tracker for patch 0.5.">
  <title>Wayfinder — PoE 2 Campaign</title><link rel="stylesheet" href="styles.css">
</head>
<body>
  <aside class="sidebar"><a class="logo" href="#top">✦ <span>WAYFINDER</span><small>POE 2 / 0.5</small></a>
    <nav id="act-nav" aria-label="Campaign acts"></nav>
    <div class="sidebar__bottom"><button id="edit-toggle" type="button">✎ Edit guide</button><button id="reset-progress" type="button">Reset checklist</button></div>
  </aside>
  <main id="top"><header class="topbar"><div><p>CAMPAIGN REWARD TRACKER</p><h1>Find your way to the Atlas.</h1></div><div class="topbar__progress"><b id="completed-count">0</b><span> / <b id="total-count">0</b> claimed</span><i><em id="progress-bar"></em></i></div></header>
    <section class="tools"><div class="filters" role="group" aria-label="Filter rewards"><button class="active" data-filter="all">All</button><button data-filter="points">Points</button><button data-filter="stats">Stats</button><button data-filter="choice">Choices</button></div><button id="add-reward" class="add" hidden type="button">+ Add reward</button></section>
    <p id="edit-note" class="edit-note" hidden>Editing is local to this browser. Your additions and changes are saved automatically.</p>
    <section id="reward-list" class="rewards" aria-live="polite"></section>
  </main>
  <template id="reward-template"><article class="reward"><button class="check" type="button" aria-label="Toggle completed"></button><div class="reward__main"><p class="location"></p><h2></h2><p class="bonus"></p></div><span class="tag"></span><div class="actions" hidden><button class="edit" type="button">Edit</button><button class="delete" type="button">Delete</button></div></article></template>
  <script src="app.js"></script>
</body>
</html>
